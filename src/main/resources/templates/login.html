<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm" style="width: 420px;">
        <div class="card-body p-5">
            <h3 class="text-center fw-bold mb-1">
                <a href="/" class="text-decoration-none text-dark">ModaStore</a>
            </h3>
            <p class="text-center text-muted mb-4">Acesse sua conta</p>

            <div th:if="${param.error}" class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle me-1"></i> E-mail ou senha incorretos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2">
                <i class="bi bi-check-circle me-1"></i> Você saiu com sucesso.
            </div>
            <div th:if="${success}" class="alert alert-success py-2" th:text="${success}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">E-mail</label>
                    <input type="email" name="username" class="form-control"
                           placeholder="seu@email.com" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">Entrar</button>
            </form>

            <hr class="my-4">
            <p class="text-center mb-0">
                Não tem conta? <a href="/register" class="fw-semibold">Cadastre-se</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
