<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ModaStore</a>
        <div class="d-flex gap-3 align-items-center">
            <a class="nav-link text-white" href="/admin">Dashboard</a>
            <a class="nav-link text-white" href="/admin/products">Produtos</a>
            <a class="nav-link text-white" href="/admin/orders">Pedidos</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm" type="submit">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container my-4">
    <h2 class="fw-bold mb-4">Dashboard</h2>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card bg-primary text-white shadow h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <p class="mb-1 opacity-75">Produtos ativos</p>
                        <h2 class="fw-bold mb-0" th:text="${products.size()}"></h2>
                    </div>
                    <i class="bi bi-box-seam" style="font-size: 3rem; opacity: 0.5;"></i>
                </div>
                <div class="card-footer border-0 bg-transparent">
                    <a href="/admin/products" class="text-white text-decoration-none small">
                        Gerenciar produtos &rarr;
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-success text-white shadow h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <p class="mb-1 opacity-75">Pedidos totais</p>
                        <h2 class="fw-bold mb-0" th:text="${orders.size()}"></h2>
                    </div>
                    <i class="bi bi-bag" style="font-size: 3rem; opacity: 0.5;"></i>
                </div>
                <div class="card-footer border-0 bg-transparent">
                    <a href="/admin/orders" class="text-white text-decoration-none small">
                        Ver pedidos &rarr;
                    </a>
                </div>
            </div>
        </div>
    </div>

    <h4 class="fw-bold mb-3">Últimos Pedidos</h4>
    <div class="card shadow-sm">
        <div th:if="${orders.empty}" class="card-body text-muted text-center py-4">
            Nenhum pedido ainda.
        </div>
        <table class="table table-hover mb-0" th:unless="${orders.empty}">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.id}"></td>
                    <td th:text="${order.user.name}"></td>
                    <td th:text="${'R$ ' + #numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                             (${order.status.name() == 'CONFIRMED'} ? 'bg-info' :
                                             (${order.status.name() == 'SHIPPED'} ? 'bg-primary' :
                                             (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                              th:text="${order.status}"></span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
