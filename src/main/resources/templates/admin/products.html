<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Admin ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ModaStore</a>
        <div class="d-flex gap-3 align-items-center">
            <a class="nav-link text-white" href="/admin">Dashboard</a>
            <a class="nav-link text-white fw-bold" href="/admin/products">Produtos</a>
            <a class="nav-link text-white" href="/admin/orders">Pedidos</a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-outline-light btn-sm" type="submit">Sair</button>
            </form>
        </div>
    </div>
</nav>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Produtos</h2>
        <a href="/admin/products/new" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Novo Produto
        </a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}">
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${products.empty}">
                        <td colspan="6" class="text-center text-muted py-4">Nenhum produto cadastrado.</td>
                    </tr>
                    <tr th:each="product : ${products}">
                        <td class="text-muted small" th:text="${product.id}"></td>
                        <td class="fw-semibold" th:text="${product.name}"></td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:if="${product.category}" th:text="${product.category.name}"></span>
                            <span th:unless="${product.category}" class="text-muted">—</span>
                        </td>
                        <td th:text="${'R$ ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}"></td>
                        <td>
                            <span th:text="${product.stock}"
                                  th:class="${product.stock < 5} ? 'text-danger fw-bold' : ''"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/admin/products/edit/{id}(id=${product.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/admin/products/delete/{id}(id=${product.id})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('Remover este produto?')">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
