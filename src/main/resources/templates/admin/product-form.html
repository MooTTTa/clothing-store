<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - Admin ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">ModaStore</a>
        <div class="d-flex gap-3 align-items-center">
            <a class="nav-link text-white" href="/admin">Dashboard</a>
            <a class="nav-link text-white" href="/admin/products">Produtos</a>
            <a class="nav-link text-white" href="/admin/orders">Pedidos</a>
        </div>
    </div>
</nav>

<div class="container my-4" style="max-width: 640px;">
    <h2 class="fw-bold mb-4"
        th:text="${product.id != null} ? 'Editar Produto' : 'Novo Produto'"></h2>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form th:action="@{/admin/products/save}" method="post" th:object="${product}">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{active}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nome *</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Descrição</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>

                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label fw-semibold">Preço (R$) *</label>
                        <input type="number" th:field="*{price}" class="form-control"
                               step="0.01" min="0.01" required>
                    </div>
                    <div class="col">
                        <label class="form-label fw-semibold">Estoque</label>
                        <input type="number" th:field="*{stock}" class="form-control" min="0">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Categoria</label>
                    <select name="categoryId" class="form-select">
                        <option value="">Sem categoria</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product.category != null and product.category.id == cat.id}">
                        </option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">URL da Imagem</label>
                    <input type="url" th:field="*{imageUrl}" class="form-control"
                           placeholder="https://exemplo.com/imagem.jpg">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Salvar</button>
                    <a href="/admin/products" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
