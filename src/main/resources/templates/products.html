<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-4 flex-grow-1">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="card shadow-sm mb-3">
                    <div class="card-header fw-bold">Buscar</div>
                    <div class="card-body">
                        <form th:action="@{/products}" method="get">
                            <div class="input-group">
                                <input type="text" name="search" class="form-control"
                                       placeholder="Nome do produto..." th:value="${search}">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header fw-bold">Categorias</div>
                    <div class="list-group list-group-flush">
                        <a href="/products"
                           class="list-group-item list-group-item-action"
                           th:classappend="${selectedCategory == null and search == null} ? ' active' : ''">
                            Todas as categorias
                        </a>
                        <a th:each="cat : ${categories}"
                           th:href="@{/products(category=${cat.id})}"
                           th:text="${cat.name}"
                           class="list-group-item list-group-item-action"
                           th:classappend="${selectedCategory != null and selectedCategory == cat.id} ? ' active' : ''">
                        </a>
                    </div>
                </div>
            </div>

            <!-- Grid de Produtos -->
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">
                        <span th:if="${search}">Resultados para: "<strong th:text="${search}"></strong>"</span>
                        <span th:unless="${search}">Todos os Produtos</span>
                    </h5>
                    <span class="text-muted small" th:text="${products.size()} + ' produto(s)'"></span>
                </div>

                <div th:if="${products.empty}" class="text-center py-5">
                    <i class="bi bi-search fs-1 text-muted"></i>
                    <p class="mt-2 text-muted">Nenhum produto encontrado.</p>
                    <a href="/products" class="btn btn-outline-primary">Ver todos</a>
                </div>

                <div class="row g-3" th:unless="${products.empty}">
                    <div class="col-sm-6 col-lg-4" th:each="product : ${products}">
                        <div class="card h-100 shadow-sm hover-card">
                            <div class="product-img-wrapper">
                                <img th:if="${product.imageUrl}" th:src="${product.imageUrl}" th:alt="${product.name}">
                                <i th:unless="${product.imageUrl}" class="bi bi-image text-secondary" style="font-size: 3.5rem;"></i>
                            </div>
                            <div class="card-body d-flex flex-column">
                                <span class="badge bg-secondary mb-1 align-self-start"
                                      th:if="${product.category}" th:text="${product.category.name}"></span>
                                <h6 class="card-title" th:text="${product.name}"></h6>
                                <p class="card-text text-muted small flex-grow-1"
                                   th:text="${#strings.abbreviate(product.description, 65)}"></p>
                                <div class="d-flex justify-content-between align-items-center mt-2">
                                    <span class="fw-bold text-primary"
                                          th:text="${'R$ ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}"></span>
                                    <a th:href="@{/product/{id}(id=${product.id})}" class="btn btn-sm btn-primary">Ver</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 ModaStore. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
