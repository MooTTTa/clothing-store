<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Cabeçalho da página -->
    <div style="background:#fafafa;border-bottom:1px solid #eee;padding:28px 0;">
        <div class="container">
            <span class="page-title">Loja</span>
            <h1 style="font-size:1.5rem;font-weight:700;margin:4px 0 0;letter-spacing:-0.3px;">
                <span th:if="${search}">Resultados para "<span th:text="${search}"></span>"</span>
                <span th:unless="${search}">Todos os Produtos</span>
            </h1>
        </div>
    </div>

    <div class="container my-4 flex-grow-1">
        <div class="row g-4">

            <!-- Sidebar -->
            <div class="col-md-3">
                <!-- Busca -->
                <div class="filter-card mb-3">
                    <div class="filter-header">Buscar</div>
                    <div style="padding:14px 16px;">
                        <form th:action="@{/products}" method="get">
                            <div class="input-group">
                                <input type="text" name="search" class="form-control"
                                       placeholder="Nome do produto..."
                                       th:value="${search}">
                                <button type="submit" class="btn-search">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Categorias -->
                <div class="filter-card">
                    <div class="filter-header">Categorias</div>
                    <a href="/products"
                       class="cat-filter-item"
                       th:classappend="${selectedCategory == null and search == null} ? ' active' : ''">
                        Todas
                    </a>
                    <a th:each="cat : ${categories}"
                       th:href="@{/products(category=${cat.id})}"
                       th:text="${cat.name}"
                       class="cat-filter-item"
                       th:classappend="${selectedCategory != null and selectedCategory == cat.id} ? ' active' : ''">
                    </a>
                </div>
            </div>

            <!-- Grid -->
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span style="font-size:0.8rem;color:#888;letter-spacing:0.5px;"
                          th:text="${products.size()} + ' produto(s) encontrado(s)'"></span>
                </div>

                <!-- Vazio -->
                <div th:if="${products.empty}" class="text-center py-5">
                    <i class="bi bi-search" style="font-size:2.5rem;color:#ccc;"></i>
                    <p class="mt-3" style="color:#999;font-size:0.9rem;">Nenhum produto encontrado.</p>
                    <a href="/products" class="btn-outline-black mt-2" style="padding:10px 24px;font-size:0.75rem;">Ver todos</a>
                </div>

                <!-- Produtos -->
                <div class="row g-3" th:unless="${products.empty}">
                    <div class="col-sm-6 col-lg-4" th:each="product : ${products}">
                        <div class="product-card">
                            <div class="product-img-wrapper">
                                <img th:if="${product.imageUrl}"
                                     th:src="${product.imageUrl}"
                                     th:alt="${product.name}">
                                <i th:unless="${product.imageUrl}"
                                   class="bi bi-image no-image-icon"></i>
                            </div>
                            <div class="product-card-body">
                                <span class="product-badge"
                                      th:if="${product.category}"
                                      th:text="${product.category.name}"></span>
                                <div class="product-name" th:text="${product.name}"></div>
                                <div class="product-desc"
                                     th:text="${#strings.abbreviate(product.description, 60)}"></div>
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="product-price"
                                          th:text="${'R$ ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}"></span>
                                    <a th:href="@{/product/{id}(id=${product.id})}" class="btn-product">Ver</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-moda">
        <div class="container">
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="footer-brand">MODASTORE</div>
                    <div class="footer-tagline">Moda com estilo e qualidade</div>
                </div>
                <div class="col-md-2">
                    <div class="footer-title">Loja</div>
                    <a href="/products">Produtos</a>
                    <a href="/cart">Carrinho</a>
                </div>
                <div class="col-md-2">
                    <div class="footer-title">Conta</div>
                    <a href="/login">Entrar</a>
                    <a href="/register">Cadastrar</a>
                    <a href="/orders">Meus Pedidos</a>
                </div>
                <div class="col-md-4">
                    <div class="footer-title">Contato</div>
                    <a href="#">contato@modastore.com.br</a>
                </div>
            </div>
            <hr class="footer-divider">
            <div class="footer-bottom text-center">
                &copy; 2024 ModaStore. Todos os direitos reservados.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
