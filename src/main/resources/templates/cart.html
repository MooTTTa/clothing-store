<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-4 flex-grow-1">
        <h2 class="fw-bold mb-4"><i class="bi bi-cart3 me-2"></i>Carrinho</h2>

        <div th:if="${items.empty}" class="text-center py-5">
            <i class="bi bi-cart-x display-1 text-muted"></i>
            <p class="mt-3 text-muted fs-5">Seu carrinho está vazio.</p>
            <a href="/products" class="btn btn-primary btn-lg mt-2">Continuar Comprando</a>
        </div>

        <div th:unless="${items.empty}" class="row g-4">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Produto</th>
                                    <th class="text-center">Preço</th>
                                    <th class="text-center">Qtd</th>
                                    <th class="text-center">Subtotal</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item : ${items}">
                                    <td>
                                        <div class="fw-semibold" th:text="${item.productName}"></div>
                                    </td>
                                    <td class="text-center"
                                        th:text="${'R$ ' + #numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')}"></td>
                                    <td class="text-center" style="width: 150px;">
                                        <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post"
                                              class="d-flex justify-content-center gap-1">
                                            <input type="number" name="quantity" class="form-control form-control-sm text-center"
                                                   th:value="${item.quantity}" min="1" style="width: 65px;">
                                            <button type="submit" class="btn btn-sm btn-outline-secondary">OK</button>
                                        </form>
                                    </td>
                                    <td class="text-center fw-bold text-primary"
                                        th:text="${'R$ ' + #numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}"></td>
                                    <td class="text-center">
                                        <form th:action="@{/cart/remove/{id}(id=${item.productId})}" method="post">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <a href="/products" class="btn btn-outline-secondary mt-3">
                    <i class="bi bi-arrow-left me-1"></i>Continuar Comprando
                </a>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header fw-bold fs-5">Resumo do Pedido</div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Subtotal:</span>
                            <span th:text="${'R$ ' + #numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-4 fw-bold fs-5">
                            <span>Total:</span>
                            <span class="text-primary"
                                  th:text="${'R$ ' + #numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}"></span>
                        </div>
                        <a href="/checkout" class="btn btn-success btn-lg w-100">
                            <i class="bi bi-credit-card me-2"></i>Finalizar Compra
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 ModaStore. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
