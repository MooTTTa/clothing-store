<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ModaStore - Loja de Roupas Online</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Hero -->
    <div class="bg-dark text-white py-5">
        <div class="container text-center py-3">
            <h1 class="display-4 fw-bold">ModaStore</h1>
            <p class="lead mb-4">As melhores roupas com os melhores preços</p>
            <a href="/products" class="btn btn-light btn-lg px-5">Ver Coleção</a>
        </div>
    </div>

    <!-- Categorias -->
    <div class="container my-5">
        <h2 class="fw-bold mb-4">Categorias</h2>
        <div class="row g-3">
            <div class="col-6 col-md-3" th:each="cat : ${categories}">
                <a th:href="@{/products(category=${cat.id})}" class="text-decoration-none">
                    <div class="card text-center h-100 border-0 shadow-sm hover-card">
                        <div class="card-body py-4">
                            <i class="bi bi-tag fs-1 text-primary"></i>
                            <h5 class="card-title mt-2 text-dark" th:text="${cat.name}"></h5>
                            <p class="card-text text-muted small" th:text="${cat.description}"></p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- Produtos em Destaque -->
    <div class="container my-5">
        <h2 class="fw-bold mb-4">Produtos em Destaque</h2>
        <div class="row g-4">
            <div class="col-sm-6 col-md-4 col-lg-3" th:each="product : ${products}">
                <div class="card h-100 shadow-sm hover-card">
                    <div class="product-img-wrapper">
                        <img th:if="${product.imageUrl}" th:src="${product.imageUrl}" th:alt="${product.name}">
                        <i th:unless="${product.imageUrl}" class="bi bi-image text-secondary" style="font-size: 4rem;"></i>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <span class="badge bg-secondary mb-1 align-self-start"
                              th:if="${product.category}" th:text="${product.category.name}"></span>
                        <h6 class="card-title" th:text="${product.name}"></h6>
                        <p class="card-text text-muted small flex-grow-1"
                           th:text="${#strings.abbreviate(product.description, 70)}"></p>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="fw-bold text-primary"
                                  th:text="${'R$ ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}"></span>
                            <a th:href="@{/product/{id}(id=${product.id})}" class="btn btn-sm btn-primary">Ver</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 ModaStore. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
