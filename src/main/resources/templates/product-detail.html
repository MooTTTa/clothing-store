<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - ModaStore'">Produto - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-4 flex-grow-1">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Início</a></li>
                <li class="breadcrumb-item"><a href="/products">Produtos</a></li>
                <li class="breadcrumb-item active" th:text="${product.name}"></li>
            </ol>
        </nav>

        <div class="row g-5">
            <div class="col-md-5">
                <div class="card border-0 shadow-sm">
                    <div class="product-img-wrapper" style="height: 380px;">
                        <img th:if="${product.imageUrl}" th:src="${product.imageUrl}" th:alt="${product.name}" style="max-height: 360px;">
                        <i th:unless="${product.imageUrl}" class="bi bi-image text-secondary" style="font-size: 7rem;"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <span class="badge bg-secondary mb-2"
                      th:if="${product.category}" th:text="${product.category.name}"></span>
                <h2 class="fw-bold" th:text="${product.name}"></h2>
                <p class="text-muted" th:text="${product.description}"></p>

                <hr>

                <div class="my-3">
                    <span class="display-6 fw-bold text-primary"
                          th:text="${'R$ ' + #numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')}"></span>
                </div>

                <p>
                    <i class="bi bi-box-seam me-1"></i>
                    <span th:if="${product.stock > 0}" class="text-success fw-semibold"
                          th:text="${product.stock} + ' unidades disponíveis'"></span>
                    <span th:unless="${product.stock > 0}" class="text-danger fw-semibold">Fora de estoque</span>
                </p>

                <form th:if="${product.stock > 0}"
                      th:action="@{/cart/add/{id}(id=${product.id})}" method="post"
                      class="d-flex align-items-center gap-3 mt-4">
                    <div class="input-group" style="width: 120px;">
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="this.nextElementSibling.stepDown()">-</button>
                        <input type="number" name="quantity" class="form-control text-center"
                               value="1" min="1" th:max="${product.stock}">
                        <button type="button" class="btn btn-outline-secondary"
                                onclick="this.previousElementSibling.stepUp()">+</button>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-cart-plus me-1"></i> Adicionar ao Carrinho
                    </button>
                </form>

                <div th:unless="${product.stock > 0}" class="alert alert-warning mt-3">
                    <i class="bi bi-exclamation-triangle me-1"></i> Produto indisponível no momento.
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 ModaStore. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
