<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-moda">
    <div class="container">
        <a class="navbar-brand" href="/">MODASTORE</a>

        <button class="navbar-toggler border-secondary" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" href="/">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="/products">Produtos</a></li>
            </ul>

            <ul class="navbar-nav align-items-center gap-3">
                <li class="nav-item">
                    <a class="btn-cart position-relative" href="/cart">
                        <i class="bi bi-bag me-1"></i> Carrinho
                        <span class="badge bg-white text-black position-absolute top-0 start-100 translate-middle"
                              style="font-size:0.6rem;"
                              th:if="${cartCount != null and cartCount > 0}"
                              th:text="${cartCount}"></span>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn-nav-outline" href="/login">Entrar</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="btn-nav-solid" href="/register">Cadastrar</a>
                </li>

                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle text-white d-flex align-items-center gap-1"
                       href="#" data-bs-toggle="dropdown">
                        <i class="bi bi-person"></i>
                        <span sec:authentication="name" style="font-size:0.8rem;letter-spacing:0.5px;"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="/orders">
                                <i class="bi bi-bag me-2"></i>Meus Pedidos
                            </a>
                        </li>
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item" href="/admin">
                                <i class="bi bi-gear me-2"></i>Painel Admin
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="bi bi-box-arrow-right me-2"></i>Sair
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
