<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow-sm" style="width: 460px;">
        <div class="card-body p-5">
            <h3 class="text-center fw-bold mb-1">
                <a href="/" class="text-decoration-none text-dark">ModaStore</a>
            </h3>
            <p class="text-center text-muted mb-4">Crie sua conta</p>

            <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

            <form th:action="@{/register}" method="post" th:object="${user}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nome completo</label>
                    <input type="text" th:field="*{name}" class="form-control"
                           placeholder="Seu nome" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">E-mail</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           placeholder="seu@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Senha</label>
                    <input type="password" th:field="*{password}" class="form-control"
                           placeholder="Mínimo 6 caracteres" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">Criar Conta</button>
            </form>

            <hr class="my-4">
            <p class="text-center mb-0">
                Já tem conta? <a href="/login" class="fw-semibold">Entrar</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
