<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-4 flex-grow-1">
        <h2 class="fw-bold mb-4">Finalizar Compra</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card shadow-sm">
                    <div class="card-header fw-bold fs-5">
                        <i class="bi bi-geo-alt me-2"></i>Endereço de Entrega
                    </div>
                    <div class="card-body">
                        <form th:action="@{/checkout}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Endereço completo</label>
                                <textarea name="shippingAddress" class="form-control" rows="4"
                                          placeholder="Rua, número, complemento, bairro, cidade - UF, CEP"
                                          required></textarea>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100">
                                <i class="bi bi-check-circle me-2"></i>Confirmar Pedido
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-header fw-bold fs-5">Resumo</div>
                    <div class="card-body">
                        <div th:each="item : ${items}" class="d-flex justify-content-between mb-2 pb-2 border-bottom">
                            <span>
                                <span th:text="${item.productName}"></span>
                                <small class="text-muted" th:text="' x' + ${item.quantity}"></small>
                            </span>
                            <span th:text="${'R$ ' + #numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}"></span>
                        </div>
                        <div class="d-flex justify-content-between fw-bold fs-5 mt-3">
                            <span>Total:</span>
                            <span class="text-primary"
                                  th:text="${'R$ ' + #numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 ModaStore. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
