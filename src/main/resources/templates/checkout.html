<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Compra - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <!-- Cabeçalho -->
    <div style="background:#fafafa;border-bottom:1px solid #eee;padding:28px 0;">
        <div class="container">
            <span class="page-title">Loja</span>
            <h1 style="font-size:1.5rem;font-weight:700;margin:4px 0 0;letter-spacing:-0.3px;">Finalizar Compra</h1>
        </div>
    </div>

    <div class="container my-5 flex-grow-1">

        <div th:if="${error}" class="alert alert-danger rounded-0 mb-4" th:text="${error}"></div>

        <div class="row g-5">

            <!-- Formulário -->
            <div class="col-lg-7">
                <form th:action="@{/checkout}" method="post">

                    <!-- Bloco 1: Endereço -->
                    <div style="border:1px solid #e8e8e8;margin-bottom:24px;">
                        <div style="padding:16px 20px;border-bottom:1px solid #e8e8e8;background:#fafafa;">
                            <span style="font-size:0.7rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#111;">
                                <i class="bi bi-geo-alt me-2"></i>Endereço de Entrega
                            </span>
                        </div>
                        <div style="padding:24px 20px;">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label" style="font-size:0.78rem;font-weight:600;letter-spacing:0.5px;color:#444;">CEP *</label>
                                    <div class="position-relative">
                                        <input type="text" id="cep" name="cep" class="form-control rounded-0"
                                               placeholder="00000-000" maxlength="9" required
                                               oninput="formatarCep(this)" onblur="buscarCep(this.value)">
                                        <span id="cep-spinner" class="position-absolute top-50 end-0 translate-middle-y pe-2 d-none">
                                            <span class="spinner-border spinner-border-sm text-secondary"></span>
                                        </span>
                                    </div>
                                    <div id="cep-erro" class="text-danger mt-1" style="font-size:0.75rem;display:none;">CEP não encontrado.</div>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label" style="font-size:0.78rem;font-weight:600;letter-spacing:0.5px;color:#444;">Rua / Avenida *</label>
                                    <input type="text" id="rua" name="rua" class="form-control rounded-0"
                                           placeholder="Preenchido automaticamente pelo CEP" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label" style="font-size:0.78rem;font-weight:600;letter-spacing:0.5px;color:#444;">Número *</label>
                                    <input type="text" id="numero" name="numero" class="form-control rounded-0"
                                           placeholder="Ex: 123" required>
                                </div>
                                <div class="col-md-9">
                                    <label class="form-label" style="font-size:0.78rem;font-weight:600;letter-spacing:0.5px;color:#444;">Complemento</label>
                                    <input type="text" name="complemento" class="form-control rounded-0"
                                           placeholder="Apto, Bloco, Casa... (opcional)">
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label" style="font-size:0.78rem;font-weight:600;letter-spacing:0.5px;color:#444;">Bairro *</label>
                                    <input type="text" id="bairro" name="bairro" class="form-control rounded-0"
                                           placeholder="Preenchido automaticamente" required>
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label" style="font-size:0.78rem;font-weight:600;letter-spacing:0.5px;color:#444;">Cidade *</label>
                                    <input type="text" id="cidade" name="cidade" class="form-control rounded-0"
                                           placeholder="Preenchida automaticamente" required>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label" style="font-size:0.78rem;font-weight:600;letter-spacing:0.5px;color:#444;">Estado *</label>
                                    <select id="estado" name="estado" class="form-select rounded-0" required>
                                        <option value="">UF</option>
                                        <option>AC</option><option>AL</option><option>AP</option>
                                        <option>AM</option><option>BA</option><option>CE</option>
                                        <option>DF</option><option>ES</option><option>GO</option>
                                        <option>MA</option><option>MT</option><option>MS</option>
                                        <option>MG</option><option>PA</option><option>PB</option>
                                        <option>PR</option><option>PE</option><option>PI</option>
                                        <option>RJ</option><option>RN</option><option>RS</option>
                                        <option>RO</option><option>RR</option><option>SC</option>
                                        <option>SP</option><option>SE</option><option>TO</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bloco 2: Pagamento -->
                    <div style="border:1px solid #e8e8e8;margin-bottom:32px;">
                        <div style="padding:16px 20px;border-bottom:1px solid #e8e8e8;background:#fafafa;">
                            <span style="font-size:0.7rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#111;">
                                <i class="bi bi-credit-card me-2"></i>Forma de Pagamento
                            </span>
                        </div>
                        <div style="padding:20px;">
                            <div class="d-flex flex-column gap-2">
                                <label style="border:1px solid #ddd;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;">
                                    <input type="radio" name="pagamento" value="pix" checked>
                                    <i class="bi bi-qr-code fs-5"></i>
                                    <div>
                                        <div style="font-size:0.85rem;font-weight:600;">PIX</div>
                                        <div style="font-size:0.75rem;color:#888;">Aprovação imediata</div>
                                    </div>
                                </label>
                                <label style="border:1px solid #ddd;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;">
                                    <input type="radio" name="pagamento" value="boleto">
                                    <i class="bi bi-upc fs-5"></i>
                                    <div>
                                        <div style="font-size:0.85rem;font-weight:600;">Boleto Bancário</div>
                                        <div style="font-size:0.75rem;color:#888;">Vence em 3 dias úteis</div>
                                    </div>
                                </label>
                                <label style="border:1px solid #ddd;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;">
                                    <input type="radio" name="pagamento" value="cartao">
                                    <i class="bi bi-credit-card fs-5"></i>
                                    <div>
                                        <div style="font-size:0.85rem;font-weight:600;">Cartão de Crédito</div>
                                        <div style="font-size:0.75rem;color:#888;">Em até 12x sem juros</div>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-black w-100" style="padding:16px;font-size:0.85rem;">
                        <i class="bi bi-check-circle me-2"></i>Confirmar Pedido
                    </button>
                </form>
            </div>

            <!-- Resumo do pedido -->
            <div class="col-lg-5">
                <div style="border:1px solid #e8e8e8;position:sticky;top:20px;">
                    <div style="padding:16px 20px;border-bottom:1px solid #e8e8e8;background:#fafafa;">
                        <span style="font-size:0.7rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#111;">
                            Resumo do Pedido
                        </span>
                    </div>
                    <div style="padding:20px;">
                        <div th:each="item : ${items}"
                             class="d-flex justify-content-between align-items-start mb-3 pb-3"
                             style="border-bottom:1px solid #f0f0f0;">
                            <div>
                                <div style="font-size:0.85rem;font-weight:600;" th:text="${item.productName}"></div>
                                <div style="font-size:0.75rem;color:#888;" th:text="'Qtd: ' + ${item.quantity}"></div>
                            </div>
                            <span style="font-size:0.85rem;font-weight:600;white-space:nowrap;"
                                  th:text="${'R$ ' + #numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}"></span>
                        </div>

                        <div class="d-flex justify-content-between mb-2" style="font-size:0.85rem;color:#888;">
                            <span>Subtotal</span>
                            <span th:text="${'R$ ' + #numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-3" style="font-size:0.85rem;color:#888;">
                            <span>Frete</span>
                            <span style="color:#2e7d32;">Grátis</span>
                        </div>
                        <div class="d-flex justify-content-between pt-3" style="border-top:2px solid #111;">
                            <span style="font-weight:700;font-size:1rem;">Total</span>
                            <span style="font-weight:700;font-size:1.1rem;"
                                  th:text="${'R$ ' + #numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer-moda">
        <div class="container">
            <hr class="footer-divider" style="margin-top:0;">
            <div class="footer-bottom text-center">
                &copy; 2024 ModaStore. Todos os direitos reservados.
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function formatarCep(input) {
            let v = input.value.replace(/\D/g, '');
            if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5, 8);
            input.value = v;
        }

        async function buscarCep(cep) {
            const apenas = cep.replace(/\D/g, '');
            if (apenas.length !== 8) return;

            const spinner = document.getElementById('cep-spinner');
            const erro    = document.getElementById('cep-erro');
            erro.style.display = 'none';
            spinner.classList.remove('d-none');

            try {
                const res  = await fetch(`https://viacep.com.br/ws/${apenas}/json/`);
                const data = await res.json();

                if (data.erro) {
                    erro.style.display = 'block';
                    return;
                }

                document.getElementById('rua').value    = data.logradouro || '';
                document.getElementById('bairro').value = data.bairro     || '';
                document.getElementById('cidade').value = data.localidade  || '';

                const select = document.getElementById('estado');
                for (let opt of select.options) {
                    if (opt.value === data.uf) { opt.selected = true; break; }
                }

                // Foca no número para o usuário completar
                document.getElementById('numero').focus();
            } catch {
                erro.textContent = 'Erro ao buscar CEP. Verifique sua conexão.';
                erro.style.display = 'block';
            } finally {
                spinner.classList.add('d-none');
            }
        }
    </script>
</body>
</html>
