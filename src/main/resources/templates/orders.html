<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Pedidos - ModaStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-4 flex-grow-1">
        <h2 class="fw-bold mb-4"><i class="bi bi-bag-check me-2"></i>Meus Pedidos</h2>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div th:if="${orders.empty}" class="text-center py-5">
            <i class="bi bi-bag-x display-1 text-muted"></i>
            <p class="mt-3 text-muted fs-5">Você ainda não fez nenhum pedido.</p>
            <a href="/products" class="btn btn-primary btn-lg mt-2">Fazer Compras</a>
        </div>

        <div th:unless="${orders.empty}">
            <div class="card shadow-sm mb-4" th:each="order : ${orders}">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span class="fw-bold">Pedido #<span th:text="${order.id}"></span></span>
                    <div class="d-flex align-items-center gap-3">
                        <span class="badge fs-6"
                              th:classappend="${order.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                             (${order.status.name() == 'CONFIRMED'} ? 'bg-info' :
                                             (${order.status.name() == 'SHIPPED'} ? 'bg-primary' :
                                             (${order.status.name() == 'DELIVERED'} ? 'bg-success' : 'bg-danger')))"
                              th:text="${order.status}"></span>
                        <span class="text-muted small"
                              th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                </div>
                <div class="card-body">
                    <div th:each="item : ${order.items}" class="d-flex justify-content-between py-1 border-bottom">
                        <span>
                            <span th:text="${item.product.name}"></span>
                            <small class="text-muted" th:text="' x' + ${item.quantity}"></small>
                        </span>
                        <span th:text="${'R$ ' + #numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}"></span>
                    </div>
                    <div class="d-flex justify-content-between fw-bold mt-2">
                        <span>Total:</span>
                        <span class="text-primary"
                              th:text="${'R$ ' + #numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')}"></span>
                    </div>
                    <p class="text-muted small mt-2 mb-0">
                        <i class="bi bi-geo-alt me-1"></i>
                        <span th:text="${order.shippingAddress}"></span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 ModaStore. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
